<!DOCTYPE html>
<html>
<head>
    <title>Password Analyzer</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>

        body {
            margin: 0;
            background: #0f172a;
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .card {
            background: #1e293b;
            padding: 30px;
            border-radius: 14px;
            width: 360px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }

        h2 {
            margin-bottom: 20px;
        }

        .input-box {
            display: flex;
            align-items: center;
            background: #334155;
            border-radius: 10px;
            height: 45px;
            padding: 0 10px;
        }

        input {
            flex: 1;
            height: 100%;
            border: none;
            outline: none;
            background: transparent;
            color: white;
            font-size: 15px;
        }

        input::placeholder {
            color: #94a3b8;
        }

        /* 👁️ EYE ICON */

        .eye {
            width: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .eye svg {
            width: 20px;
            height: 20px;
            fill: white;
        }

        /* 🔥 STRENGTH BAR */

        .bar {
            height: 8px;
            border-radius: 5px;
            margin-top: 15px;
            margin-bottom: 10px;
            background: #475569;
            width: 0%;
            transition: width 0.3s ease;
        }

        .weak {
            width: 30%;
            background: red;
        }

        .medium {
            width: 60%;
            background: orange;
        }

        .strong {
            width: 100%;
            background: #22c55e;
        }

        #result {
            margin-top: 10px;
            font-size: 14px;
        }

        #crack {
            margin-top: 6px;
            color: #22c55e;
        }

        #suggestion {
            margin-top: 5px;
            color: #38bdf8;
        }

    </style>
</head>

<body>

<div class="card">

    <h2>Password Strength Checker</h2>

    <div class="input-box">

        <input
            type="password"
            id="password"
            placeholder="Enter password"
            oninput="checkPassword()"
        >

        <div class="eye" onclick="togglePassword()">

            <svg viewBox="0 0 24 24">
                <path d="M12 5c-7 0-10 7-10 7s3 7 10 7 10-7 10-7-3-7-10-7zm0 12a5 5 0 1 1 0-10 5 5 0 0 1 0 10z"/>
            </svg>

        </div>

    </div>

    <div id="strengthBar" class="bar"></div>

    <p id="result"></p>

    <p id="crack"></p>

    <p id="suggestion"></p>

</div>

<script>

function togglePassword() {

    let input = document.getElementById("password");

    input.type =
        input.type === "password"
        ? "text"
        : "password";
}

function checkPassword() {

    let pwd = document.getElementById("password").value;

    let strength = "Weak";
    let entropy = 0;
    let crack = "Seconds";
    let reused = false;

    let score = 0;

    if (pwd.length >= 8) score++;
    if (/[A-Z]/.test(pwd)) score++;
    if (/[0-9]/.test(pwd)) score++;
    if (/[^A-Za-z0-9]/.test(pwd)) score++;

    entropy = pwd.length * score * 2.5;

    if (score <= 1) {

        strength = "Weak";
        crack = "Seconds";
    }

    else if (score <= 3) {

        strength = "Medium";
        crack = "Hours to Days";
    }

    else {

        strength = "Strong";
        crack = "Years";
    }

    let bar = document.getElementById("strengthBar");

    bar.className = "bar";

    if (strength === "Weak") {

        bar.classList.add("weak");
    }

    else if (strength === "Medium") {

        bar.classList.add("medium");
    }

    else {

        bar.classList.add("strong");
    }

    document.getElementById("result").innerText =
        `Strength: ${strength} | Entropy: ${entropy.toFixed(2)} | Reused: ${reused}`;

    document.getElementById("crack").innerText =
        `Crack Time: ${crack}`;

    let suggestion = "";

    if (pwd.length < 8) {

        suggestion = "Password too short";
    }

    else if (!/[A-Z]/.test(pwd)) {

        suggestion = "Add uppercase letters";
    }

    else if (!/[0-9]/.test(pwd)) {

        suggestion = "Add numbers";
    }

    else if (!/[^A-Za-z0-9]/.test(pwd)) {

        suggestion = "Add symbols (!@#$)";
    }

    else {

        suggestion = "Excellent! Strong password 👍";
    }

    document.getElementById("suggestion").innerText =
        suggestion;
}

</script>

</body>
</html>
